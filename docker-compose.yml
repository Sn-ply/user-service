version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snaply
      POSTGRES_PASSWORD: snaply_secret
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snaply"]
      interval: 5s
      retries: 10

  user-service:
    build: .
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://snaply:snaply_secret@postgres:5432/users?sslmode=disable
      JWT_SECRET: dev_secret_change_in_production
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
